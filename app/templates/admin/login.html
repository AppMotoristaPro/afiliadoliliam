{% extends "base.html" %}
{% block title %}Acesso Restrito{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-gold">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-navy tracking-widest uppercase">ELLIC</h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">Portal de Parceiros de Negócios</p>
        </div>
        <form method="POST" action="{{ url_for('admin.login') }}" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-navy uppercase tracking-wide mb-1">E-mail Corporativo</label>
                <input type="email" name="email" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-gold focus:border-gold outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-navy uppercase tracking-wide mb-1">Credencial</label>
                <input type="password" name="senha" required class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-gold focus:border-gold outline-none transition">
            </div>
            <button type="submit" class="w-full bg-navy hover:bg-navy-light text-white font-bold py-3 rounded-lg shadow-lg transition tracking-wide">AUTENTICAR</button>
        </form>
    </div>
</div>
{% endblock %}
