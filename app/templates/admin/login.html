{% extends "base.html" %}
{% block title %}Autenticação | Ellic{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center items-center px-4">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black text-navy tracking-widest uppercase">ELLIC</h1>
        <p class="text-gray-400 mt-1 text-xs font-bold uppercase tracking-wider">Portal de Acesso</p>
    </div>
    
    <div class="w-full max-w-sm glass-panel p-8 rounded-3xl shadow-ios-heavy">
        <form method="POST" action="{{ url_for('admin.login') }}" class="space-y-5">
            <div>
                <input type="email" name="email" required placeholder="E-mail de acesso" class="w-full px-5 py-4 bg-white text-gray-900 rounded-2xl outline-none focus:ring-2 focus:ring-gold/50 font-medium text-sm border border-gray-100 shadow-sm transition-all">
            </div>
            <div>
                <input type="password" name="senha" required placeholder="Palavra-passe" class="w-full px-5 py-4 bg-white text-gray-900 rounded-2xl outline-none focus:ring-2 focus:ring-gold/50 font-medium text-sm border border-gray-100 shadow-sm transition-all">
            </div>
            
            <button type="submit" class="w-full bg-navy text-white font-bold py-4 rounded-2xl shadow-md active:scale-95 transition-all text-sm tracking-wide uppercase mt-2">
                Entrar no Sistema
            </button>
        </form>
    </div>
</div>
{% endblock %}
