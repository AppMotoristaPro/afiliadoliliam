{% extends "base.html" %}
{% block title %}Acesso | Ellic{% endblock %}
{% block content %}
<div class="min-h-[85vh] flex flex-col justify-center items-center">
    
    <div class="text-center mb-10">
        <h1 class="text-5xl font-black text-navy tracking-widest uppercase">ELLIC</h1>
        <p class="text-gray-500 mt-2 text-sm font-medium tracking-wide">Portal do Afiliado</p>
    </div>

    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-ios-heavy">
        <form method="POST" action="{{ url_for('admin.login') }}" class="space-y-5">
            <div>
                <input type="email" name="email" required placeholder="E-mail Corporativo" class="w-full px-5 py-4 bg-gray-100 text-gray-900 rounded-2xl focus:bg-white focus:ring-2 focus:ring-gold/50 focus:border-gold outline-none transition-all placeholder-gray-400 font-medium">
            </div>
            <div>
                <input type="password" name="senha" required placeholder="Sua Senha" class="w-full px-5 py-4 bg-gray-100 text-gray-900 rounded-2xl focus:bg-white focus:ring-2 focus:ring-gold/50 focus:border-gold outline-none transition-all placeholder-gray-400 font-medium">
            </div>
            <button type="submit" class="w-full bg-navy hover:bg-navy-light text-white font-bold py-4 rounded-2xl shadow-lg transition-all tracking-wide mt-2 active:scale-95">ACESSAR PAINEL</button>
        </form>
    </div>
</div>
{% endblock %}
